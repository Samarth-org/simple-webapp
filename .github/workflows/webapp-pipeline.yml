name: WebApp CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '**'
  workflow_dispatch:

jobs:

  compile-and-test:
    name: "Compile & Unit Test"
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: "Step 1 - Checkstyle and Package"
        run: mvn clean checkstyle:check package -Dcheckstyle.failOnViolation=false

      - name: "Step 2 - Run Unit Tests"
        run: mvn test

      - name: "Step 3 - Package (Skip Tests)"
        run: mvn package -DskipTests

      - name: "Step 4 - Print Build Version"
        run: echo "Build Version ${{ github.run_number }}"

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  dockerize-and-push:
    name: "Dockerize & Push"
    runs-on: ubuntu-latest
    needs: compile-and-test

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: "Step 1 - Verify Artifact in target"
        run: ls -l target/

      - name: "Step 2 - Build Docker Image"
        run: |
          docker build --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.run_number }} \
            -f Dockerfile .

      - name: "Step 3 - Push Docker Image"
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.run_number }}

  deploy-to-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: dockerize-and-push
    environment: staging

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: "Step 1 - Pull Docker Image"
        run: |
          docker pull \
            ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.run_number }}

      - name: "Step 2 - Run Docker Container"
        run: |
          docker run -d -p 8080:8080 \
            --name webapp-run \
            ${{ secrets.DOCKER_USERNAME }}/simple-webapp:${{ github.run_number }}

      - name: "Step 3 - Verify Application is Running"
        run: |
          sleep 10
          curl -I http://localhost:8080
